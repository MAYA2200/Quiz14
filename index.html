<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz C/C++</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            width: 80%;
            max-width: 700px;
            margin: 50px auto;
            background: rgba(0,0,0,0.3);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
        }

        .question {
            margin-bottom: 25px;
        }

        .question h3 {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin: 8px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        label:hover {
            background: rgba(255,255,255,0.25);
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00c853;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00e676;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Quiz C/C++</h1>

    <form id="quizForm">

        <!-- Intrebarea 1 -->
        <div class="question">
            <h3>1. Ce tip de date este utilizat pentru numere reale în C/C++?</h3>

            <label><input type="radio" name="q1" value="0"> int</label>
            <label><input type="radio" name="q1" value="1"> float</label>
            <label><input type="radio" name="q1" value="0"> char</label>
            <label><input type="radio" name="q1" value="0"> bool</label>
        </div>

        <!-- Intrebarea 2 -->
        <div class="question">
            <h3>2. Care instrucțiune este utilizată pentru repetare?</h3>

            <label><input type="radio" name="q2" value="0"> if</label>
            <label><input type="radio" name="q2" value="1"> for</label>
            <label><input type="radio" name="q2" value="0"> switch</label>
            <label><input type="radio" name="q2" value="0"> break</label>
        </div>

        <!-- Intrebarea 3 -->
        <div class="question">
            <h3>3. Ce simbol se folosește pentru comentarii pe o singură linie?</h3>

            <label><input type="radio" name="q3" value="1"> //</label>
            <label><input type="radio" name="q3" value="0"> ##</label>
            <label><input type="radio" name="q3" value="0"> &&</label>
            <label><input type="radio" name="q3" value="0"> **</label>
        </div>

        <!-- Intrebarea 4 -->
        <div class="question">
            <h3>4. Ce instrucțiune afișează text în C++?</h3>

            <label><input type="radio" name="q4" value="1"> cout</label>
            <label><input type="radio" name="q4" value="0"> cin</label>
            <label><input type="radio" name="q4" value="0"> scanf</label>
            <label><input type="radio" name="q4" value="0"> return</label>
        </div>

        <!-- Intrebarea 5 -->
        <div class="question">
            <h3>5. Ce valoare returnează de obicei funcția main() la final?</h3>

            <label><input type="radio" name="q5" value="1"> 0</label>
            <label><input type="radio" name="q5" value="0"> 1</label>
            <label><input type="radio" name="q5" value="0"> -1</label>
            <label><input type="radio" name="q5" value="0"> void</label>
        </div>

        <button type="button" onclick="calculateScore()">
            Verifică răspunsurile
        </button>

    </form>

    <div id="result"></div>
</div>

<script>
    function calculateScore() {

        let score = 0;

        const answers = document.querySelectorAll('input[type="radio"]:checked');

        answers.forEach(answer => {
            score += parseInt(answer.value);
        });

        const totalQuestions = 5;

        document.getElementById("result").innerHTML =
            "Ai obținut " + score + " din " + totalQuestions + " puncte!";
    }
</script>

</body>
</html>
